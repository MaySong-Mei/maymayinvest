services:
  db:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: maymayinvest_v1_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maymay
      POSTGRES_PASSWORD: maymay_dev
      POSTGRES_DB: maymayinvest_v1
    ports:
      - "5544:5432"
    volumes:
      - maymay_v1_pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maymay -d maymayinvest_v1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  maymay_v1_pgdata:
